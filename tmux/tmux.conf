# tmux — in-window layer (HANDOFF §4)
# Symlinked to ~/.tmux.conf by scripts/install.sh

# Prefix: Ctrl-Space (decision 8.2, resolved 2026-06-04).
# Later a Moonlander thumb/layer key can simply emit Ctrl-Space — no change needed here.
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Truecolor + correct terminal type — important for Claude Code / TUI rendering
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,*:RGB"

# Sensible base
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 100000
set -g mouse on
set -sg escape-time 10
set -g focus-events on

# vi copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Intuitive splits, keep current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload
bind r source-file ~/.tmux.conf \; display "reloaded"

# Plugins (tpm) — install with prefix + I
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'   # save/restore sessions (decision 8.8: on)
set -g @plugin 'tmux-plugins/tmux-continuum'   # auto-save
set -g @continuum-restore 'on'
run '~/.tmux/plugins/tpm/tpm'
