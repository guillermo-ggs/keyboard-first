# AeroSpace — window layer (HANDOFF §5)
#
# Mod key: Hyper = ctrl-alt-shift-cmd (decision 8.6, resolved 2026-06-04).
#   - Emitted by Moonlander firmware only: a thumb key in Oryx (built-in Hyper
#     keycode, QMK KC_HYPR). No Karabiner — the built-in keyboard has no Hyper;
#     fallback there is Raycast / Cmd-Tab / the `aerospace` CLI (accepted trade-off).
#   - Contingency for built-in-keyboard Hyper: karabiner/hyper.json (opt-in).
#
# Hyper already contains Shift, so the i3-style "mod-shift-X = move" pattern is
# impossible. Moving windows lives in a dedicated 'move' mode instead: hyper-m,
# then h/j/k/l to nudge, 1-8 to send to a workspace, esc/enter to leave.
#
# Chords are written out as ctrl-alt-shift-cmd-X on purpose: the key-mapping
# alias (hyper = 'ctrl-alt-shift-cmd') is NOT supported in 0.20.3-Beta
# (verified via `aerospace reload-config --dry-run`, 2026-06-04). Re-try the
# alias after the next AeroSpace upgrade.

start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# exec-and-forget runs commands with a minimal environment; put Homebrew on
# PATH so scripts can call `aerospace` (bit us 2026-06-05 with hyper-g).
# NOTE: must sit below all top-level keys — TOML keys after a [table] header
# belong to that table.
[exec.env-vars]
PATH = '/opt/homebrew/bin:${PATH}'

[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 8
outer.right = 8
outer.top = 8
outer.bottom = 8

[mode.main.binding]
# Focus (vim-style)
ctrl-alt-shift-cmd-h = 'focus left'
ctrl-alt-shift-cmd-j = 'focus down'
ctrl-alt-shift-cmd-k = 'focus up'
ctrl-alt-shift-cmd-l = 'focus right'

# Layouts
# GOTCHA (diagnosed 2026-06-05): hyper-period/comma/slash are RESERVED by macOS
# for sysdiagnose (period = capture + white screen flash, comma/slash = variants).
# Intercepted below the app layer — AeroSpace never sees them, no way to disable
# (https://github.com/pqrs-org/Karabiner-Elements/issues/1107). Never bind them.
ctrl-alt-shift-cmd-s = 'layout tiles horizontal vertical'      # Split (was hyper-slash, sysdiagnose-reserved)
ctrl-alt-shift-cmd-a = 'layout accordion horizontal vertical'  # Accordion (was hyper-comma, sysdiagnose-reserved)
ctrl-alt-shift-cmd-g = 'exec-and-forget ~/dev/misc/keyboard-first/scripts/aerospace-grid.sh'  # Grid: one-shot 2-row grid (4 -> 2x2) of the focused workspace
ctrl-alt-shift-cmd-f = 'fullscreen'   # zoom focused window (toggle) — AeroSpace-fullscreen, not macOS-native
ctrl-alt-shift-cmd-t = 'layout floating tiling'   # pop window out of the grid (toggle); hyper-hjkl still reaches it by screen position

# Switch workspace (scheme per decision 8.3 — numbered, iterate as needed)
ctrl-alt-shift-cmd-1 = 'workspace 1'   # terminal (iTerm2 + tmux)
ctrl-alt-shift-cmd-2 = 'workspace 2'   # chrome
ctrl-alt-shift-cmd-3 = 'workspace 3'   # intellij
ctrl-alt-shift-cmd-4 = 'workspace 4'   # comms/media: slack + obsidian + spotify
ctrl-alt-shift-cmd-5 = 'workspace 5'   # personal chrome (retina; toggles with 4)
ctrl-alt-shift-cmd-6 = 'workspace 6'   # utilities: bitwarden + docker (floating)
ctrl-alt-shift-cmd-7 = 'workspace 7'   # tracking chrome (LG)
ctrl-alt-shift-cmd-8 = 'workspace 8'   # scratch pairing: no assigned apps (e.g. terminal + intellij side by side)

ctrl-alt-shift-cmd-tab = 'workspace-back-and-forth'

# Multi-monitor
# NOTE: move-workspace-to-monitor is rejected for force-assigned (pinned)
# workspaces, which is 1-4 — so we move the focused WINDOW across monitors
# instead (it joins the workspace visible there). Unpinned workspaces can
# still be moved via CLI: aerospace move-workspace-to-monitor --wrap-around next
ctrl-alt-shift-cmd-quote = 'move-node-to-monitor --wrap-around next'    # throw focused window to next monitor (was hyper-period, sysdiagnose-reserved; quote sits next to semicolon)
ctrl-alt-shift-cmd-semicolon = 'focus-monitor --wrap-around next'       # jump focus to next monitor

# Modes
ctrl-alt-shift-cmd-m = 'mode move'
ctrl-alt-shift-cmd-r = 'mode resize'

[mode.move.binding]
# Nudge focused window within the tree — stays in mode for repeated moves
h = 'move left'
j = 'move down'
k = 'move up'
l = 'move right'
# Join with neighbor under a common parent container (opposite orientation,
# so joining horizontal neighbors stacks them vertically). 4 columns -> 2x2:
# focus col 2, shift-h (stacks 1+2), focus col 4, shift-h (stacks 3+4).
shift-h = 'join-with left'
shift-j = 'join-with down'
shift-k = 'join-with up'
shift-l = 'join-with right'
# Send focused window to a workspace — one-shot, exits the mode
1 = ['move-node-to-workspace 1', 'mode main']
2 = ['move-node-to-workspace 2', 'mode main']
3 = ['move-node-to-workspace 3', 'mode main']
4 = ['move-node-to-workspace 4', 'mode main']
5 = ['move-node-to-workspace 5', 'mode main']
6 = ['move-node-to-workspace 6', 'mode main']
7 = ['move-node-to-workspace 7', 'mode main']
8 = ['move-node-to-workspace 8', 'mode main']
enter = 'mode main'
esc = 'mode main'

[mode.resize.binding]
h = 'resize width -50'
j = 'resize height +50'
k = 'resize height -50'
l = 'resize width +50'
enter = 'mode main'
esc = 'mode main'

# --- Workspace -> monitor pinning (owner-decided 2026-06-04) ---
# Patterns match monitor names case-insensitively; arrays are fallback order,
# so undocked (no Dell) everything falls back to the main display.
# Monitors at decision time: LG ULTRAGEAR, Built-in Retina Display, DELL S2725QS.
[workspace-to-monitor-force-assignment]
1 = ['dell', 'main']   # terminal    -> DELL S2725QS
2 = ['dell', 'main']   # chrome      -> DELL S2725QS
3 = ['dell', 'main']   # intellij    -> DELL S2725QS
4 = 'built-in'         # comms/media -> MacBook Retina display (shared with 5: hyper-4/hyper-5 picks)
5 = 'built-in'         # personal    -> MacBook Retina (shares it with 4: hyper-4/hyper-5 picks)
7 = ['lg', 'main']     # tracking    -> LG ULTRAGEAR
# 6 (utilities) and 8 (scratch pairing) intentionally unpinned

# --- App -> workspace assignment ---
# VERIFY app-ids with `aerospace list-apps` once AeroSpace is running (Phase 1).
[[on-window-detected]]
if.app-id = 'com.googlecode.iterm2'
run = 'move-node-to-workspace 1'

# Chrome routing — three instances, ORDER MATTERS (first matching rule wins).
# Titles verified live 2026-06-04:
#   tracking (named window): "second chrome - Google Chrome - Guillermo (decisionbrain.com)"
#   personal:                "<page> - Google Chrome - Guillermo"          <- ends at name
#   work:                    "<page> - Google Chrome - Guillermo (decisionbrain.com)"
# The tracking window is a Chrome named window ("Name window..." on the tab
# strip) — the name replaces the page title and survives Chrome restarts.
[[on-window-detected]]
if.app-id = 'com.google.Chrome'
if.window-title-regex-substring = '^second chrome - Google Chrome'
run = 'move-node-to-workspace 7'

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
if.window-title-regex-substring = 'Google Chrome - Guillermo$'
run = 'move-node-to-workspace 5'

# Fallback: work profile + anything else (incl. incognito) -> main work chrome
[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = 'move-node-to-workspace 4'

# IntelliJ routing — two rules, ORDER MATTERS (first match wins).
# Main project windows are titled "project – file" (en-dash, verified live
# 2026-06-05 via `aerospace list-windows --all`); dialogs/popups (Settings,
# Commit, diff viewers, Welcome screen) never are. Only main windows are
# routed to workspace 3 — dialogs float and stay on the workspace of the
# instance that spawned them, instead of being yanked back to 3.
# Caveat: a NEW project window opened from an instance living elsewhere is
# still routed to 3 (rules can't tell which instance spawned a window).
[[on-window-detected]]
if.app-id = 'com.jetbrains.intellij'
if.window-title-regex-substring = ' – '
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'com.jetbrains.intellij'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'md.obsidian'
run = 'move-node-to-workspace 4'

[[on-window-detected]]
if.app-id = 'com.spotify.client'
run = 'move-node-to-workspace 4'

# Utility apps: float (exempt from tiling) and keep off the working workspaces
[[on-window-detected]]
if.app-id = 'com.bitwarden.desktop'
run = ['layout floating', 'move-node-to-workspace 6']

[[on-window-detected]]
if.app-id = 'com.electron.dockerdesktop'
run = ['layout floating', 'move-node-to-workspace 6']

